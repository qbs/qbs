name: 'Download Qbs'
description: 'Downloads Qbs'
inputs:
  version:
    description: 'Qbs version'
    required: false
    default: '3.0.3'
runs:
  using: "composite"
  steps:
    - name: Install Qbs
      run: |
        QBS_DIR=$(./scripts/install-qbs.sh -d $HOME/qbs --version ${{ inputs.version }})
        (cygpath -w ${QBS_DIR} 2>/dev/null || echo ${QBS_DIR}) >> ${GITHUB_PATH}
      shell: bash
